<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ManhwaTR AI</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/tesseract.js@4.0.2/dist/tesseract.min.js"></script>
</head>
<body>

    <h1>ManhwaTR AI</h1>
    <p>Yapay zekâ destekli manhwa çeviri platformu</p>

    <div class="upload-section">
        <input type="file" id="imageInput" accept="image/*">
        <button id="translateBtn">Çevir</button>
    </div>

    <div class="preview-section">
        <img id="imagePreview" src="" alt="Yüklenen Manhwa Sayfası" style="max-width: 100%; display: none; margin-top: 20px; border-radius: 8px;">
    </div>

    <div class="result-section" style="margin-top: 20px;">
        <h3 id="statusText"></h3>
        <div id="ocrResult" style="white-space: pre-wrap; background: #222; color: #fff; padding: 10px; border-radius: 5px; display: none;"></div>
    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const imagePreview = document.getElementById('imagePreview');
        const translateBtn = document.getElementById('translateBtn');
        const statusText = document.getElementById('statusText');
        const ocrResult = document.getElementById('ocrResult');

        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    imagePreview.src = event.target.result;
                    imagePreview.style.display = 'block';
                    statusText.innerText = "Resim yüklendi. Çevir butonuna basabilirsiniz.";
                    ocrResult.style.display = 'none';
                }
                reader.readAsDataURL(file);
            }
        });

        translateBtn.addEventListener('click', async () => {
            if (!imageInput.files[0]) {
                alert("Lütfen önce bir manhwa görseli yükleyin!");
                return;
            }

            statusText.innerText = "Görsel taranıyor... (İlk tarama 10-15 saniye sürebilir)";
            ocrResult.style.display = 'none';

            try {
                const result = await Tesseract.recognize(
                    imageInput.files[0],
                    'eng',
                    { logger: m => console.log(m.status, m.progress) }
                );

                const detectedText = result.data.text;
                
                if (!detectedText || !detectedText.trim()) {
                    statusText.innerText = "Görselde okunabilir bir metin bulunamadı. Lütfen yazının net olduğu bir resim deneyin.";
                    return;
                }

                statusText.innerText = "Metin başarıyla okundu! Türkçe'ye çevriliyor...";
                ocrResult.innerText = "Okunan Orijinal Metin:\n" + detectedText;
                ocrResult.style.display = 'block';

                const turkishText = await translateToTurkish(detectedText);
                
                statusText.innerText = "Çeviri Tamamlandı!";
                ocrResult.innerText += "\n\n--- Türkçe Çeviri ---\n" + turkishText;

            } catch (error) {
                console.error(error);
                statusText.innerText = "Tarama sırasında bir hata oluştu: " + error.message;
            }
        });

        async function translateToTurkish(text) {
            try {
                const response = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|tr`);
                const data = await response.json();
                if (data.responseData && data.responseData.translatedText) {
                    return data.responseData.translatedText;
                } else {
                    return "Çeviri servisi yoğun, lütfen tekrar deneyin.";
                }
            } catch (error) {
                console.error("Çeviri Hatası:", error);
                return "Çeviri motoruna bağlanılamadı.";
            }
        }
    </script>
</body>
</html>
